              - generic [ref=e68]:
                - paragraph [ref=e69]: "When you build components with Tailwind, two problems show up constantly:"
                - list [ref=e70]:
                  - listitem [ref=e71]:
                    - text: You want to conditionally include classes based on state (
                    - code [ref=e72]: disabled
                    - text: ","
                    - code [ref=e73]: active
                    - text: ", etc.) —"
                    - code [ref=e74]: clsx
                    - text: solves this.
                  - listitem [ref=e75]:
                    - text: You want consumers to override your base classes —
                    - code [ref=e76]: tailwind-merge
                    - text: resolves
                    - code [ref=e77]: p-2 p-4
                    - text: to
                    - code [ref=e78]: p-4
                    - text: ", instead of letting both win randomly."
                - paragraph [ref=e79]:
                  - strong [ref=e80]: cn()
                  - text: combines both in one call. Every ShadNG component uses it internally.
          - generic "Import" [ref=e81]:
