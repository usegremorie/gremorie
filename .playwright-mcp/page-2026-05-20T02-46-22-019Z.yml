                    - code [ref=e67]: tailwind-merge
                    - text: resolves
                    - code [ref=e68]: p-2 p-4
                    - text: to
                    - code [ref=e69]: p-4
                    - text: ", instead of letting both win randomly."
                - paragraph [ref=e70]:
