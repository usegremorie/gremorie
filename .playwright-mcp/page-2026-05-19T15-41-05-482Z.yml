            - generic [ref=e41]: Integration
            - heading "Plain signals — no AI library" [level=1] [ref=e42]
            - paragraph [ref=e43]: End-to-end streaming chat using only Angular signals, fetch, and ReadableStream. No Hashbrown, no Vercel AI SDK, no NgRx. Use this as a reference when wiring ShadNG to a custom backend.
          - generic "What this shows" [ref=e44]:
            - generic [ref=e45]:
              - heading "What this shows" [level=2] [ref=e46]
              - paragraph [ref=e50]:
                - text: ShadNG components consume
                - strong [ref=e51]: signal-driven inputs
                - text: for state, value, and attachments. The library doesn't import any AI framework — you bring your own state. This example uses a backend that returns server-sent events (SSE), streamed chunk by chunk into a signal.
          - generic "Component" [ref=e52]:
            - generic [ref=e53]:
              - heading "Component" [level=2] [ref=e54]
              - generic "chat.component.ts" [ref=e56]:
                - generic [ref=e57]:
                  - generic [ref=e59]: chat.component.ts
                  - code [ref=e61]: "import { ChangeDetectionStrategy, Component, signal, } from '@angular/core'; import { PromptInput, PromptInputState, PromptInputSubmit, PromptInputSubmitEvent, PromptInputTextarea, PromptInputToolbar, } from '@kalvner/shadng-prompt-input'; @Component({ selector: 'app-chat', imports: [PromptInput, PromptInputTextarea, PromptInputToolbar, PromptInputSubmit], changeDetection: ChangeDetectionStrategy.OnPush, template: ` <div class=\"flex flex-col gap-4\"> <pre class=\"whitespace-pre-wrap rounded-md bg-muted p-4 text-sm\">{{ response() }}</pre> <prompt-input [(value)]=\"prompt\" [state]=\"state()\" (submitted)=\"onSubmit($event)\" (canceled)=\"onCancel()\" (retried)=\"onSubmit({ value: prompt(), attachments: [], preventDefault: noop })\" > <prompt-input-textarea placeholder=\"Ask anything…\" /> <prompt-input-toolbar> <prompt-input-submit /> </prompt-input-toolbar> </prompt-input> </div> `, }) export class ChatComponent { prompt = signal(''); state = signal<PromptInputState>('ready'); response = signal(''); private controller: AbortController | null = null; protected readonly noop = () => undefined; async onSubmit({ value }: PromptInputSubmitEvent) { this.state.set('submitted'); this.response.set(''); this.controller = new AbortController(); try { const res = await fetch('/api/chat', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ prompt: value }), signal: this.controller.signal, }); if (!res.ok || !res.body) { throw new Error('Network error'); } this.state.set('streaming'); const reader = res.body.getReader(); const decoder = new TextDecoder(); while (true) { const { value: chunk, done } = await reader.read(); if (done) break; this.response.update((prev) => prev + decoder.decode(chunk)); } this.state.set('ready'); this.prompt.set(''); } catch (err) { if ((err as Error).name === 'AbortError') { this.state.set('ready'); return; } this.state.set('error'); } } onCancel() { this.controller?.abort(); } }"
