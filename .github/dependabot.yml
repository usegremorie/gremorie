version: 2

updates:
  # npm dependencies (single workspace lockfile at the root)
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 8
    versioning-strategy: increase
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
    # Group updates so the monorepo does not get one PR per package.
    groups:
      angular:
        patterns:
          - '@angular/*'
          - '@angular-devkit/*'
          - '@analogjs/*'
          - 'ng-packagr'
      nx:
        patterns:
          - 'nx'
          - '@nx/*'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
          - 'radix-ui'
          - '@radix-ui/*'
      dev-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch

  # GitHub Actions used by the workflows
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: 'chore(ci)'
    groups:
      actions:
        patterns:
          - '*'
