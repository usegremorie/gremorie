name: Dependency Review

# Fails a PR that adds a dependency with a known vulnerability or a
# disallowed license, before it ever reaches the lockfile on main.
# Complements Dependabot (which acts after merge) by shifting the check left.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Dependency review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          # MIT-licensed project; keep copyleft out of the dependency graph.
          deny-licenses: GPL-3.0, AGPL-3.0
